site_name: HyperWave
site_description: >-
  Fast, robust gravitational-wave parameter estimation — four likelihoods
  (Gaussian, hyperbolic, Whittle, heterodyne), GPU waveforms, wavelet
  reconstruction, LISA support.
repo_url: https://github.com/asasli/HyperWave
repo_name: asasli/HyperWave

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: default
      primary: deep purple
      toggle: { icon: material/weather-night, name: Dark mode }
    - scheme: slate
      primary: deep purple
      toggle: { icon: material/weather-sunny, name: Light mode }
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex: { generic: true }
  - tables

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: false
            members_order: source

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Likelihoods: likelihoods.md
  - GPU acceleration: gpu.md
  - Wavelet reconstruction: wavelets.md
  - LISA: lisa.md
  - Validation (PP tests): validation.md
  - API reference: api.md
